name: docker

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "*.*.*"
    paths:
      - .github/workflows/docker.yml
      - Dockerfile
      - go.mod
      - go.sum
      - "**/*.go"
  pull_request:
    paths:
      - .github/workflows/docker.yml
      - Dockerfile
      - go.mod
      - go.sum
      - "**/*.go"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  actions: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # # disabled if major zero
            # type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,enable=true,priority=100,prefix=,suffix=,format=short
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=simplyddns
            org.opencontainers.image.description=A simple DDNS client written in Go.
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.url=https://github.com/mingcheng/simplyddns
            org.opencontainers.image.vendor=${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>

      - name: Prepare build metadata
        id: build
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ steps.build.outputs.build_time }}
            BUILD_COMMIT=${{ steps.build.outputs.commit }}
